name: Send Poem Notification

on:
  workflow_run:
    workflows: ["Generate Poem"]
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  notify:
    # Run only if the triggering workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
      CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Download run status artifact
        uses: actions/download-artifact@v4
        with:
          name: run-status
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Send notification
        run: uv run python scripts/notifications.py
